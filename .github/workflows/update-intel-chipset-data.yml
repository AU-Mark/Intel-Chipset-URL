name: Update Intel Chipset Download Data

on:
  schedule:
    # Run daily at 8:00 AM UTC (offset from the Java 8 scraper at 7 AM to avoid overlap)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Get Chrome version
        id: chrome-version
        shell: pwsh
        run: |
          $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          if (Test-Path $chromePath) {
            $version = (Get-Item $chromePath).VersionInfo.FileVersion
            Write-Host "Chrome version: $version"
            "version=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Chrome not found"
            exit 1
          }

      - name: Install Selenium PowerShell Module
        shell: pwsh
        run: |
          Install-Module -Name Selenium -Scope CurrentUser -Force -AllowClobber
          $seleniumPath = (Get-Module -ListAvailable Selenium).ModuleBase
          Write-Host "Selenium installed at: $seleniumPath"

      - name: Download ChromeDriver
        shell: pwsh
        run: |
          $chromeVersion = "${{ steps.chrome-version.outputs.version }}"
          $majorVersion = $chromeVersion.Split('.')[0]
          Write-Host "Chrome major version: $majorVersion"

          # Get ChromeDriver URL from Chrome for Testing
          $jsonUrl = "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json"
          $versions = (Invoke-RestMethod -Uri $jsonUrl).versions

          # Find matching ChromeDriver
          $matchingVersion = $versions | Where-Object { $_.version -like "$majorVersion.*" } | Select-Object -Last 1

          if ($matchingVersion) {
            $driverUrl = ($matchingVersion.downloads.chromedriver | Where-Object { $_.platform -eq 'win64' }).url
            Write-Host "Downloading ChromeDriver from: $driverUrl"

            $downloadPath = "$env:TEMP\chromedriver.zip"
            Invoke-WebRequest -Uri $driverUrl -OutFile $downloadPath

            # Extract to Selenium assemblies folder
            $seleniumPath = (Get-Module -ListAvailable Selenium).ModuleBase
            $assembliesPath = Join-Path $seleniumPath "assemblies"

            Expand-Archive -Path $downloadPath -DestinationPath "$env:TEMP\chromedriver" -Force
            Copy-Item "$env:TEMP\chromedriver\chromedriver-win64\chromedriver.exe" -Destination $assembliesPath -Force

            Write-Host "ChromeDriver installed to: $assembliesPath"
            & (Join-Path $assembliesPath "chromedriver.exe") --version
          } else {
            Write-Error "Could not find matching ChromeDriver"
            exit 1
          }

      - name: Run Update Script
        id: scrape
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          & ".\scripts\Update-IntelChipsetData.ps1" -Verbose
        continue-on-error: true

      - name: Validate Data File
        id: validate
        shell: pwsh
        run: |
          $valid = $true
          $changes = $false

          # Check IntelChipset.json
          $dataPath = "data/IntelChipset.json"
          if (Test-Path $dataPath) {
            $data = Get-Content $dataPath -Raw | ConvertFrom-Json
            if ($data.Latest -and $data.Latest.Version -and $data.Latest.Url) {
              Write-Host "IntelChipset.json valid: Version $($data.Latest.Version)"
              Write-Host "  URL: $($data.Latest.Url)"

              # Latest.Url must be a GitHub Release SetupChipset.exe link (what consumers download)
              if ($data.Latest.Url -notmatch '^https://github\.com/AU-Mark/Intel-Chipset-URL/releases/download/.+/SetupChipset\.exe$') {
                Write-Warning "Latest.Url does not match the expected GitHub Release pattern"
                $valid = $false
              }
              # IntelUrl should still record the source Intel mirror
              if ($data.Latest.IntelUrl -and $data.Latest.IntelUrl -notmatch '^https://downloadmirror\.intel\.com/\d+/SetupChipset\.exe$') {
                Write-Warning "Latest.IntelUrl does not match the expected downloadmirror pattern"
                $valid = $false
              }
            } else {
              Write-Warning "IntelChipset.json missing Latest.Version or Latest.Url"
              $valid = $false
            }
          } else {
            Write-Warning "IntelChipset.json not found"
            $valid = $false
          }

          # Check for changes
          $gitStatus = git status --porcelain
          if ($gitStatus) {
            $changes = $true
            Write-Host "Changes detected"
          } else {
            Write-Host "No changes detected"
          }

          "valid=$valid" >> $env:GITHUB_OUTPUT
          "changes=$changes" >> $env:GITHUB_OUTPUT

      - name: Publish installer as GitHub Release
        if: steps.scrape.outputs.versionChanged == 'true' && steps.validate.outputs.valid == 'True'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.scrape.outputs.tag }}"
          $version = "${{ steps.scrape.outputs.version }}"
          $installer = "${{ steps.scrape.outputs.installerPath }}"

          if (-not (Test-Path $installer)) {
            Write-Error "Installer not found at: $installer"
            exit 1
          }
          Write-Host "Publishing $installer as $tag/SetupChipset.exe"

          # Create the release if it does not already exist
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Intel Chipset Device Software $version" --notes "Auto-published Intel Chipset Device Software (Chipset INF Utility) installer for version $version. Source: see data/IntelChipset.json (IntelUrl)." --latest
          } else {
            Write-Host "Release $tag already exists; updating asset"
          }

          # Upload (or overwrite) the installer asset, naming it SetupChipset.exe
          gh release upload $tag "${installer}#SetupChipset.exe" --clobber

      - name: Commit and Push Changes
        if: steps.validate.outputs.valid == 'True' && steps.validate.outputs.changes == 'True'
        shell: pwsh
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/

          $date = Get-Date -Format "yyyy-MM-dd"

          # Get version from JSON for the commit message
          $dataPath = "data/IntelChipset.json"
          $version = "unknown"
          if (Test-Path $dataPath) {
            $data = Get-Content $dataPath -Raw | ConvertFrom-Json
            if ($data.Latest.Version) {
              $version = $data.Latest.Version
            }
          }

          git commit -m "Update Intel Chipset data ($version) - $date"

          git push

      - name: Report Status
        if: always()
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "Workflow Summary"
          Write-Host "========================================="
          Write-Host "Validation: ${{ steps.validate.outputs.valid }}"
          Write-Host "Changes: ${{ steps.validate.outputs.changes }}"

          if ("${{ steps.validate.outputs.valid }}" -eq "False") {
            Write-Host "WARNING: Data validation failed. Check logs."
          }
